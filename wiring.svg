<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="780" viewBox="0 0 1040 780" font-family="Menlo,Consolas,monospace">
  <rect width="1040" height="780" fill="#0f1420"/>
  <text x="30" y="42" fill="#e8eefc" font-size="22" font-weight="bold">Pi Pico â€” Meeting Clock / Alarm / Message Display</text>
  <text x="30" y="66" fill="#7f8db0" font-size="14">8Ã— MAX7219 (2Ã—4 = 32Ã—16, display-only) Â· SSD1306 OLED menu Â· DS3231 RTC Â· rotary encoder+button Â· piezo buzzer</text>

  <!-- Legend -->
