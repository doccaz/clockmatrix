  <text x="405" y="326" fill="#7ff0c0" font-size="15" text-anchor="middle" font-weight="bold">DS3231 RTC</text>
  <text x="405" y="348" fill="#c3cbe0" font-size="12" text-anchor="middle">VCCâ†’3V3  GNDâ†’GND</text>
  <text x="405" y="366" fill="#c3cbe0" font-size="12" text-anchor="middle">SDAâ†’GP0  SCLâ†’GP1</text>

