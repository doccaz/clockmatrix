    <rect x="750" y="272" width="70" height="70" fill="#20304a" stroke="#4a5f8a"/><text x="785" y="314" fill="#dfe7fb" font-size="20" text-anchor="middle">6</text>
    <rect x="825" y="272" width="70" height="70" fill="#20304a" stroke="#4a5f8a"/><text x="860" y="314" fill="#dfe7fb" font-size="20" text-anchor="middle">5</text>
    <!-- chain arrows -->
    <text x="670" y="360" fill="#7f8db0" font-size="11">DIN enters module 1 â†’ out to 2 â†’ 3 â†’ 4 â†’ 5 â†’ â€¦ â†’ 8</text>
    <text x="600" y="376" fill="#7f8db0" font-size="11">wire top row leftâ†’right, drop down, bottom row rightâ†’left (rotated 180Â° in code)</text>
  </g>
  <text x="600" y="200" fill="#8a94ad" font-size="11"></text>
  <text x="920" y="212" fill="#c3cbe0" font-size="12">VCCâ†’5V</text>
  <text x="920" y="228" fill="#c3cbe0" font-size="12">GNDâ†’GND</text>
  <text x="920" y="244" fill="#c3cbe0" font-size="12">DINâ†’GP3</text>
  <text x="920" y="260" fill="#c3cbe0" font-size="12">CS â†’GP5</text>
  <text x="920" y="276" fill="#c3cbe0" font-size="12">CLKâ†’GP2</text>

